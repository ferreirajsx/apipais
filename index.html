<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#079185" /> <!-- Para iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="img/icons/planetalegal22.png" />


</head>

<body>
    <header>
        <h1>Pesquisa de paises</h1>
    </header>

    <main>
        <h2>Escreva Um País</h2>
        <input class="search-input" type="text" name="" id="" placeholder="Ex: Peru">
        <button class="search-button">Pesquisar</button>

        <div class="div-pais">
            <h1 class="pais-nome"></h1>
            <img class="pais-bandeira" src="" alt="">
            <p class="pais-capital"></p>
            <p class="pais-populacao"></p>
            <p class="pais-linguas"></p>
        </div>
    </main>



    <footer>Feito por Lucas Ferreira</footer>

    <script src="script.js"></script>
</body>

</html>
